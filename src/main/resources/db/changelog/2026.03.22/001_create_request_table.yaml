databaseChangeLog:
  - changeSet:
      id: 2026.03.22_001_create_request_table
      author: mihailov.pashka@yandex.ru
      changes:
        - createTable:
            tableName: requests
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: external_id
                  type: UUID
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: period
                  type: VARCHAR(10)
              - column:
                  name: format
                  type: VARCHAR(10)
              - column:
                  name: from_date
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: to_date
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: bucket
                  type: VARCHAR(10)
              - column:
                  name: requested_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: from_cache
                  type: BOOLEAN
              - column:
                  name: report_key
                  type: VARCHAR(100)

        - createSequence:
            sequenceName: request_seq
            startValue: 1
            incrementBy: 1